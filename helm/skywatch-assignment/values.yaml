frontend:
  image: {repository: ghcr.io/henria21/skywatch-assignment-frontend, tag: 7b9e88e}
  replicas: 2
  nodePort: 30080
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {cpu: 250m, memory: 128Mi}
worker:
  image: {repository: ghcr.io/henria21/skywatch-assignment-worker, tag: 7b9e88e}
  replicas: 2
  resources:
    requests: {cpu: 50m, memory: 64Mi}
    limits: {cpu: 250m, memory: 128Mi}
rabbitmq:
  image: rabbitmq:3.13-management
  resources:
    requests: {cpu: 100m, memory: 200Mi}
    limits: {cpu: 400m, memory: 350Mi}
# Pin the whole app to worker2
nodeSelector:
  kubernetes.io/hostname: skywatch-worker2
secretName: skywatch-assignment-rabbitmq
rabbitmqHost: skywatch-assignment-rabbitmq # = the ClusterIP Service name
