apiVersion: apps/v1
kind: Deployment
metadata: { name: skywatch-assignment-worker }
spec:
  replicas: {{ .Values.worker.replicas }}
  selector: { matchLabels: { app: skywatch-assignment-worker } }
  template:
    metadata: { labels: { app: skywatch-assignment-worker } }
    spec:
      nodeSelector: {{ .Values.nodeSelector | toYaml | nindent 8 }}
      containers:
        - name: worker
          image: "{{ .Values.worker.image.repository }}:{{ .Values.worker.image.tag }}"
          env: {{ include "skywatch-assignment.rabbitEnv" . | nindent 12 }}
          resources: {{ .Values.worker.resources | toYaml | nindent 12 }}
