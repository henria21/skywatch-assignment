# Sanity-check: show what server URL is in the kubeconfig before touching the cluster
- name: Check kubeconfig server URL
  ansible.builtin.shell: grep -w server "$HOME/.kube/config" || echo "FILE NOT FOUND"
  register: kube_server_line
  changed_when: false

- name: Show kubeconfig server (must be public IP, not localhost)
  ansible.builtin.debug:
    msg: "{{ kube_server_line.stdout }}"

# Clear any non-deployed helm release and its stale namespace so pre-install hooks start clean
- name: Check ArgoCD helm release status
  ansible.builtin.shell: |
    helm status argocd -n argocd --kubeconfig "$HOME/.kube/config" -o json 2>/dev/null \
      | python3 -c "import sys,json; print(json.load(sys.stdin)['info']['status'])" 2>/dev/null \
      || echo "notfound"
  register: argocd_helm_status
  changed_when: false
  failed_when: false

# Only nuke on pending states — a failed release has partial resources already on the cluster;
# letting helm upgrade those is far cheaper than a fresh install that can OOM the API server.
- name: Uninstall and clean namespace only for pending states
  ansible.builtin.shell: |
    helm uninstall argocd -n argocd --kubeconfig "$HOME/.kube/config" 2>/dev/null || true
  when: argocd_helm_status.stdout in ['pending-install', 'pending-upgrade', 'pending-rollback']
  changed_when: false
  failed_when: false

- name: Delete stale argocd namespace only for pending states
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: absent
    definition:
      apiVersion: v1
      kind: Namespace
      metadata:
        name: argocd
  when: argocd_helm_status.stdout in ['pending-install', 'pending-upgrade', 'pending-rollback']
  failed_when: false

# No --wait: let helm just apply objects and return; CRD gate below handles readiness.
# Longer timeout for the apply burst on a t3.micro API server.
- name: Install ArgoCD via Helm
  ansible.builtin.shell: |
    helm upgrade --install argocd argo-cd \
      --repo https://argoproj.github.io/argo-helm \
      --version 7.3.11 \
      --namespace argocd \
      --create-namespace \
      --kubeconfig "$HOME/.kube/config" \
      --set 'global.nodeSelector.kubernetes\.io/hostname=skywatch-worker' \
      --set server.service.type=NodePort \
      --set server.service.nodePortHttp=30082 \
      --set server.service.nodePortHttps=30083 \
      --set dex.enabled=false \
      --set notifications.enabled=false \
      --set repoServer.resources.requests.cpu=100m \
      --set repoServer.resources.requests.memory=256Mi \
      --set repoServer.resources.limits.cpu=500m \
      --set repoServer.resources.limits.memory=768Mi \
      --timeout 15m0s
  register: argocd_result
  changed_when: "'has been upgraded' in argocd_result.stdout or 'has been deployed' in argocd_result.stdout"

# GATE 1 — Application CRD must exist before we can apply the root Application
- name: Wait for Application CRD established
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: applications.argoproj.io
  register: appcrd
  until: appcrd.resources is defined and appcrd.resources | length > 0
  retries: 60
  delay: 10

- name: Ensure skywatch-assignment namespace exists
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata: { name: skywatch-assignment }

- name: Create the rabbitmq secret
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata: { name: skywatch-assignment-rabbitmq, namespace: skywatch-assignment }
      type: Opaque
      stringData:
        RABBITMQ_DEFAULT_USER: "{{ vault_rabbitmq_user }}"
        RABBITMQ_DEFAULT_PASS: "{{ vault_rabbitmq_password }}"
        rabbitmq-username:     "{{ vault_rabbitmq_user }}"
        rabbitmq-password:     "{{ vault_rabbitmq_password }}"

# GATE 1b — application-controller/repo-server/redis must be Ready before the root app is
# applied (this half of Gate 1, documented in Steps/00 since the start, was never actually
# implemented — only the CRD check below it existed). Without this, application-controller
# can query repo-server a few seconds before its Service endpoints propagate, get a single
# "connection refused", and leave skywatch-root stuck at sync status "Unknown" forever (it
# isn't auto-retried) until someone forces a hard refresh.
- name: Wait for argocd-repo-server to be ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path }}"
    api_version: apps/v1
    kind: Deployment
    name: argocd-repo-server
    namespace: argocd
  register: repo_server
  until: >
    repo_server.resources is defined and repo_server.resources | length > 0 and
    (repo_server.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 60
  delay: 5

- name: Wait for argocd-redis to be ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path }}"
    api_version: apps/v1
    kind: Deployment
    name: argocd-redis
    namespace: argocd
  register: argocd_redis
  until: >
    argocd_redis.resources is defined and argocd_redis.resources | length > 0 and
    (argocd_redis.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 60
  delay: 5

- name: Wait for argocd-application-controller to be ready
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path }}"
    api_version: apps/v1
    kind: StatefulSet
    name: argocd-application-controller
    namespace: argocd
  register: app_controller
  until: >
    app_controller.resources is defined and app_controller.resources | length > 0 and
    (app_controller.resources[0].status.readyReplicas | default(0)) >= 1
  retries: 60
  delay: 5

- name: Apply the ArgoCD root application
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    src: "{{ playbook_dir }}/../argocd/root-app.yaml"
