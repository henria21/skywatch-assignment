# Copy kubeconfig to default location so all kubernetes.core modules find it
- name: Ensure ~/.kube exists
  ansible.builtin.file:
    path: "~/.kube"
    state: directory
    mode: '0700'

- name: Copy kubeconfig to ~/.kube/config
  ansible.builtin.copy:
    src: "{{ kubeconfig_path }}"
    dest: "~/.kube/config"
    mode: '0600'

- name: Install ArgoCD via Helm
  kubernetes.core.helm:
    kubeconfig: "{{ kubeconfig_path }}"
    name: argocd
    chart_ref: argo-cd
    chart_repo_url: https://argoproj.github.io/argo-helm
    chart_version: "7.*"
    release_namespace: argocd
    create_namespace: true
    values:
      global:
        nodeSelector: { kubernetes.io/hostname: skywatch-worker }
      server:
        service:
          type: NodePort
          nodePortHttps: 30081
    wait: true

# GATE 1 — Application CRD must exist before we can apply the root Application
- name: Wait for Application CRD established
  kubernetes.core.k8s_info:
    kubeconfig: "{{ kubeconfig_path }}"
    api_version: apiextensions.k8s.io/v1
    kind: CustomResourceDefinition
    name: applications.argoproj.io
  register: appcrd
  until: appcrd.resources | length > 0
  retries: 30
  delay: 5

- name: Ensure skywatch-assignment namespace exists
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Namespace
      metadata: { name: skywatch-assignment }

- name: Create the rabbitmq secret
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    definition:
      apiVersion: v1
      kind: Secret
      metadata: { name: skywatch-assignment-rabbitmq, namespace: skywatch-assignment }
      type: Opaque
      stringData:
        RABBITMQ_DEFAULT_USER: "{{ vault_rabbitmq_user }}"
        RABBITMQ_DEFAULT_PASS: "{{ vault_rabbitmq_password }}"
        rabbitmq-username:     "{{ vault_rabbitmq_user }}"
        rabbitmq-password:     "{{ vault_rabbitmq_password }}"

- name: Apply the ArgoCD root application
  kubernetes.core.k8s:
    kubeconfig: "{{ kubeconfig_path }}"
    state: present
    src: "{{ playbook_dir }}/../argocd/root-app.yaml"
