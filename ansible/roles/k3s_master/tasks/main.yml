- name: Check if k3s is active
  ansible.builtin.command: systemctl is-active k3s
  register: k3s_status
  failed_when: false
  changed_when: false

- name: Install K3s server (pinned)
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION=v1.29.5+k3s1 \
      sh -s - server \
        --disable traefik \
        --node-name skywatch-master \
        --tls-san {{ ansible_host }} \
        --node-taint node-role.kubernetes.io/control-plane=:NoSchedule
  when: k3s_status.stdout != "active"

- name: Wait for node-token
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token

- name: Read join token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_b64

- name: Set token fact
  ansible.builtin.set_fact:
    k3s_token: "{{ k3s_token_b64.content | b64decode | trim }}"

- name: Slurp kubeconfig from master
  ansible.builtin.slurp:
    src: /etc/rancher/k3s/k3s.yaml
  register: kubeconfig_raw

- name: Ensure ~/.kube exists on controller
  ansible.builtin.file:
    path: "~/.kube"
    state: directory
    mode: '0700'
  delegate_to: localhost

# Write directly to Linux-native ~/.kube/config — avoids WSL/NTFS write issues
- name: Write kubeconfig with public IP to controller
  ansible.builtin.copy:
    content: "{{ kubeconfig_raw.content | b64decode | replace('https://127.0.0.1:6443', 'https://' + ansible_host + ':6443') | replace('https://localhost:6443', 'https://' + ansible_host + ':6443') }}"
    dest: "~/.kube/config"
    mode: '0600'
  delegate_to: localhost
