- name: Check if k3s is active
  ansible.builtin.command: systemctl is-active k3s
  register: k3s_status
  failed_when: false
  changed_when: false

- name: Install K3s server (pinned)
  ansible.builtin.shell: |
    curl -sfL https://get.k3s.io | \
      INSTALL_K3S_VERSION=v1.29.5+k3s1 \
      sh -s - server \
        --disable traefik \
        --node-name skywatch-master \
        --tls-san {{ ansible_host }} \
        --node-taint node-role.kubernetes.io/control-plane=:NoSchedule
  when: k3s_status.stdout != "active"

# Swap prevents K3s API server from being OOM-killed during heavy helm installs
- name: Create 2G swapfile on master
  ansible.builtin.command: fallocate -l 2G /swapfile
  args: { creates: /swapfile }

- name: Set swapfile permissions on master
  ansible.builtin.file:
    path: /swapfile
    mode: '0600'

- name: mkswap on master
  ansible.builtin.command: mkswap /swapfile
  register: mkswap_master
  failed_when: mkswap_master.rc != 0 and 'already' not in mkswap_master.stderr and 'is mounted' not in mkswap_master.stderr
  changed_when: "'Setting up swapspace' in mkswap_master.stdout"

- name: swapon on master
  ansible.builtin.shell: swapon /swapfile || true
  changed_when: false

- name: Wait for node-token
  ansible.builtin.wait_for:
    path: /var/lib/rancher/k3s/server/node-token

- name: Read join token
  ansible.builtin.slurp:
    src: /var/lib/rancher/k3s/server/node-token
  register: k3s_token_b64

- name: Set token fact
  ansible.builtin.set_fact:
    k3s_token: "{{ k3s_token_b64.content | b64decode | trim }}"

# Rewrite server URL on the master using sed (no base64 / Jinja2 filter chain needed),
# then ship the result to the controller as a plain file.
- name: Generate kubeconfig with public server URL
  ansible.builtin.shell: |
    sed 's|https://127\.0\.0\.1:6443|https://{{ ansible_host }}:6443|g
         s|https://localhost:6443|https://{{ ansible_host }}:6443|g' \
      /etc/rancher/k3s/k3s.yaml
  register: kubeconfig_rewritten
  changed_when: false

- name: Ensure ~/.kube exists on controller
  ansible.builtin.file:
    path: "~/.kube"
    state: directory
    mode: '0700'
  delegate_to: localhost
  become: false

# become: false so ~ resolves to the ansible user home, not /root
- name: Write kubeconfig to controller
  ansible.builtin.copy:
    content: "{{ kubeconfig_rewritten.stdout }}"
    dest: "~/.kube/config"
    mode: '0600'
  delegate_to: localhost
  become: false

# Steps/08's quick-start does `export KUBECONFIG=$(pwd)/../kubeconfig` from ansible/, and
# .gitignore already expects a repo-root `kubeconfig` file — write it here too, or every run
# leaves that file stale (or missing) and pointed at a destroyed cluster.
- name: Write kubeconfig to repo root (for the Steps/08 quick-start)
  ansible.builtin.copy:
    content: "{{ kubeconfig_rewritten.stdout }}"
    dest: "{{ playbook_dir }}/../kubeconfig"
    mode: '0600'
  delegate_to: localhost
  become: false
